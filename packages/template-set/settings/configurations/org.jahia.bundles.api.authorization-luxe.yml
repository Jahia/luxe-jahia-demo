# default configuration - won't be overridden

luxe:
  description: "Authorization to query live Luxe content through the GraphQL API."
  auto_apply:
    - origin: hosted
  grants:
    - api: "graphql"
      node: "none"
    - api: "graphql"
      node:
        pathPattern: "/,/sites(/.*)?,/modules(/.*)?,/mounts(/.*)?"
        excludedPathPattern: "/sites/[^/]+/users(/.*)?,/sites/[^/]+/groups(/.*)?"
