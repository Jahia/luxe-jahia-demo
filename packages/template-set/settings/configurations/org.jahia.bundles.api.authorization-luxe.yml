# default configuration - won't be overridden

luxe:
  description: "Authorization to query live Luxe content through the GraphQL API."
  auto_apply:
    - origin: hosted
  grants:
    - api: graphql
      node:
        excludedPathPattern: "/users(/.*)?,/groups(/.*)?,/sites/[^/]+/users(/.*)?,/sites/[^/]+/groups(/.*)?"
    - node:
        pathPattern: /,/files(/.*)?
